<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <!-- Link file CSS riêng -->
    <link rel="stylesheet" href="style.css">

    <!-- Load React & ReactDOM từ CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel standalone để biên dịch JSX trực tiếp trên trình duyệt -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_URL = "http://127.0.0.1:8000";

        function App() {
            const [status, setStatus] = useState("login"); // "login" | "register" | "start" | "loading" | "playing" | "result"
            const [questions, setQuestions] = useState([]);
            const [answers, setAnswers] = useState([]); // [{question_id, selected_answer}]
            const [resultData, setResultData] = useState(null);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(120);
            const [usernameField, setUsernameField] = useState("");
            const [passwordField, setPasswordField] = useState("");
            const [user, setUser] = useState(null);

            useEffect(() => {
                const savedUser = localStorage.getItem("quiz_user");
                if (savedUser) {
                    setUser(savedUser);
                    setStatus("start");
                }
            }, []);

            // Xử lý xác thực (Đăng nhập / Đăng ký)
            const handleAuth = async (isLogin) => {
                if (!usernameField || !passwordField) {
                    alert("Vui lòng nhập đầy đủ thông tin!");
                    return;
                }

                setStatus("loading");
                const endpoint = isLogin ? "login" : "register";
                try {
                    const res = await fetch(`${API_URL}/${endpoint}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username: usernameField, password: passwordField })
                    });

                    const data = await res.json();
                    if (!res.ok) {
                        alert(data.detail || "Có lỗi xảy ra");
                        setStatus(isLogin ? "login" : "register");
                        return;
                    }

                    if (isLogin) {
                        alert("Đăng nhập thành công!");
                        localStorage.setItem("quiz_user", data.username);
                        setUser(data.username);
                        setUsernameField("");
                        setPasswordField("");
                        setStatus("start");
                    } else {
                        alert("Đăng ký thành công! Hãy đăng nhập nhé.");
                        setStatus("login");
                    }
                } catch (error) {
                    alert("Lỗi kết nối tới server!");
                    setStatus(isLogin ? "login" : "register");
                }
            };

            const handleLogout = () => {
                localStorage.removeItem("quiz_user");
                setUser(null);
                setStatus("login");
            };

            // Hàm bắt đầu làm bài
            const handleStart = async () => {
                setStatus("loading");
                try {
                    const res = await fetch(`${API_URL}/questions`);
                    if (!res.ok) throw new Error("Server response not ok");
                    const data = await res.json();
                    setQuestions(data);
                    setAnswers([]);
                    setCurrentQIndex(0);
                    setTimeLeft(120); // Đặt lại bộ đếm khi bắt đầu
                    setStatus("playing");
                } catch (error) {
                    alert("Không thể kết nối đến server backend. Đảm bảo uvicorn main:app đang chạy trên port 8000.");
                    setStatus("start");
                }
            };

            // Hàm chọn đáp án
            const handleAnswer = (questionId, option) => {
                const newAnswers = [...answers];
                const existingIndex = newAnswers.findIndex(a => a.question_id === questionId);
                if (existingIndex > -1) {
                    newAnswers[existingIndex].selected_answer = option;
                } else {
                    newAnswers.push({ question_id: questionId, selected_answer: option });
                }
                setAnswers(newAnswers);
            };

            // Hàm chuyển câu tiếp theo
            const handleNext = () => {
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(currentQIndex + 1);
                }
            };

            // Hàm quay lại câu trước
            const handlePrev = () => {
                if (currentQIndex > 0) {
                    setCurrentQIndex(currentQIndex - 1);
                }
            };

            // Hàm nộp bài
            const handleSubmit = async (isAutoSubmit = false) => {
                if (isAutoSubmit !== true && answers.length < questions.length) {
                    const confirmSubmit = window.confirm("Bạn chưa chọn đáp án cho tất cả câu hỏi. Vẫn nộp bài?");
                    if (!confirmSubmit) return;
                }

                setStatus("loading");
                try {
                    const res = await fetch(`${API_URL}/submit`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ answers })
                    });
                    const data = await res.json();
                    setResultData(data);
                    setStatus("result");
                } catch (error) {
                    alert("Lỗi khi nộp bài!");
                    setStatus("playing");
                }
            };

            // --- Xử lý đếm ngược thời gian ---
            useEffect(() => {
                let interval = null;
                if (status === "playing") {
                    interval = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                clearInterval(interval);
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [status]);

            useEffect(() => {
                if (status === "playing" && timeLeft === 0) {
                    alert("Đã hết thời gian làm bài! Hệ thống sẽ tự động nộp bài cho bạn.");
                    handleSubmit(true);
                }
            }, [timeLeft, status]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // Render Login / Register
            if (status === "login" || status === "register") {
                const isLogin = status === "login";
                return (
                    <div className="container" style={{ maxWidth: '400px' }}>
                        <h1 style={{ textAlign: 'center', marginBottom: '20px' }}>{isLogin ? "Đăng Nhập" : "Đăng Ký"}</h1>
                        <div style={{ marginBottom: '15px' }}>
                            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>Tên đăng nhập</label>
                            <input
                                type="text"
                                value={usernameField}
                                onChange={(e) => setUsernameField(e.target.value)}
                                style={{ width: '100%', padding: '12px', borderRadius: '5px', border: '1px solid #d1d5db', boxSizing: 'border-box' }}
                                placeholder="Nhập tên đăng nhập..."
                            />
                        </div>
                        <div style={{ marginBottom: '20px' }}>
                            <label style={{ display: 'block', marginBottom: '8px', fontWeight: 'bold' }}>Mật khẩu</label>
                            <input
                                type="password"
                                value={passwordField}
                                onChange={(e) => setPasswordField(e.target.value)}
                                style={{ width: '100%', padding: '12px', borderRadius: '5px', border: '1px solid #d1d5db', boxSizing: 'border-box' }}
                                placeholder="Nhập mật khẩu..."
                            />
                        </div>
                        <button className="btn-primary" style={{ width: '100%', marginBottom: '20px', padding: '12px' }} onClick={() => handleAuth(isLogin)}>
                            {isLogin ? "Đăng Nhập" : "Đăng Ký"}
                        </button>
                        <p style={{ textAlign: 'center', margin: 0 }}>
                            {isLogin ? "Chưa có tài khoản?" : "Đã có tài khoản?"}{" "}
                            <a href="#" onClick={(e) => { e.preventDefault(); setStatus(isLogin ? "register" : "login"); }} style={{ color: '#3b82f6', fontWeight: 'bold', textDecoration: 'none' }}>
                                {isLogin ? "Đăng ký ngay" : "Đăng nhập"}
                            </a>
                        </p>
                    </div>
                );
            }

            // Render Loading
            if (status === "loading") {
                return (
                    <div className="container">
                        <h2>Đang tải...</h2>
                    </div>
                );
            }

            // Render Result
            if (status === "result" && resultData) {
                return (
                    <div className="container">
                        <h1>Kết quả của bạn</h1>
                        <div className="score-circle">
                            {resultData.score}
                        </div>
                        <p style={{ fontSize: '18px', fontWeight: 'bold' }}>
                            Số câu đúng: {resultData.correct_count} / {resultData.total}
                        </p>

                        <div className="review-list">
                            <h3>Chi tiết:</h3>
                            {resultData.results.map((r, i) => {
                                const q = questions.find(q => q.id === r.question_id);
                                return (
                                    <div key={i} className="review-item">
                                        <h4>Câu {i + 1}: {q?.question}</h4>
                                        <p>Bạn chọn: <strong>{r.selected_answer || "Chưa chọn"}</strong></p>
                                        {r.is_correct ? (
                                            <p className="review-correct">✓ Chính xác</p>
                                        ) : (
                                            <p className="review-incorrect">
                                                ✗ Sai. Đáp án đúng: {r.correct_answer}
                                            </p>
                                        )}
                                    </div>
                                );
                            })}
                        </div>

                        <button className="btn-primary" style={{ marginTop: '20px' }} onClick={() => setStatus("start")}>
                            Chơi lại
                        </button>
                    </div>
                );
            }

            // Render Playing
            if (status === "playing" && questions.length > 0) {
                const currentQuestion = questions[currentQIndex];
                const currentAnswer = answers.find(a => a.question_id === currentQuestion.id)?.selected_answer;

                return (
                    <div className="container">
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                            <div className="progress" style={{ margin: 0, padding: 0 }}>
                                Câu hỏi {currentQIndex + 1} / {questions.length}
                            </div>
                            <div className="timer" style={{
                                fontWeight: 'bold',
                                fontSize: '18px',
                                color: timeLeft <= 60 ? '#ef4444' : '#10b981',
                                background: timeLeft <= 60 ? '#fee2e2' : '#d1fae5',
                                padding: '8px 16px',
                                borderRadius: '20px',
                                boxShadow: '0 2px 5px rgba(0,0,0,0.1)',
                                transition: 'all 0.3s ease'
                            }}>
                                ⏱ {formatTime(timeLeft)}
                            </div>
                        </div>

                        <h2 className="question-text">{currentQuestion.question}</h2>

                        <div className="options-container">
                            {currentQuestion.options.map((opt, i) => (
                                <button
                                    key={i}
                                    className={`option-btn ${currentAnswer === opt ? 'selected' : ''}`}
                                    onClick={() => handleAnswer(currentQuestion.id, opt)}
                                >
                                    {opt}
                                </button>
                            ))}
                        </div>

                        <div style={{ display: 'flex', gap: '10px', justifyContent: 'space-between' }}>
                            <button
                                className="option-btn"
                                style={{ flex: 1, textAlign: 'center' }}
                                onClick={handlePrev}
                                disabled={currentQIndex === 0}
                            >
                                Quay lại
                            </button>

                            {currentQIndex === questions.length - 1 ? (
                                <button
                                    className="btn-primary"
                                    style={{ flex: 1 }}
                                    onClick={handleSubmit}
                                >
                                    Nộp bài
                                </button>
                            ) : (
                                <button
                                    className="btn-primary"
                                    style={{ flex: 1 }}
                                    onClick={handleNext}
                                >
                                    Tiếp theo
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            // Render Start Screen
            return (
                <div className="container">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                        <h1 style={{ margin: 0, fontSize: '24px' }}>Chào mừng, <span style={{ color: '#3b82f6' }}>{user}</span>!</h1>
                        <button onClick={handleLogout} style={{ background: '#ef4444', color: 'white', border: 'none', padding: '8px 16px', borderRadius: '5px', cursor: 'pointer', fontWeight: 'bold' }}>
                            Đăng xuất
                        </button>
                    </div>
                    <p style={{ marginBottom: '30px', color: '#6b7280', fontSize: '16px' }}>
                        Hãy sẵn sàng để kiểm tra kiến thức lập trình của bạn.
                        Bài ứng dụng bao gồm 5 câu hỏi liên quan đến Web Development và Fastapi.
                    </p>
                    <button className="btn-primary" onClick={handleStart}>
                        Bắt đầu
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
